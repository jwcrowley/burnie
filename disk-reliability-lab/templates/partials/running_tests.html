{% if tests %}
<div class="divide-y divide-gray-200 dark:divide-gray-700">
    {% for test in tests %}
    <div class="p-4 test-running">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-3 h-3 bg-primary-600 rounded-full animate-pulse"></div>
                <div>
                    <p class="font-mono text-sm text-gray-900 dark:text-white">{{ test.serial }}</p>
                    <p class="text-xs text-gray-500 dark:text-gray-400">{{ test.model or 'Unknown Model' }}</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-xs text-gray-500 dark:text-gray-400">Started</p>
                    <p class="text-sm text-gray-900 dark:text-white">{{ test.started or '-' }}</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-500 dark:text-gray-400">Device</p>
                    <p class="text-sm font-mono text-gray-900 dark:text-white">{{ test.device or '-' }}</p>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="p-8 text-center text-gray-500 dark:text-gray-400">
    <svg class="w-12 h-12 mx-auto mb-3 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    <p>No tests currently running</p>
</div>
{% endif %}
